[allow]
samgrd = ["ipc.core", "time.read"]
bundlemgrd = ["fs.read", "fs.verify", "ipc.core"]
keystored = ["crypto.sign", "crypto.verify", "ipc.core", "rng.entropy", "device.keygen", "policy.delegate", "statefs.keystore"]
statefsd = ["ipc.core", "policy.delegate", "device.mmio.blk"]
execd = ["proc.spawn", "ipc.core", "fs.read"]
"packagefsd" = ["ipc.core", "fs.read"]
"vfsd" = ["ipc.core", "device.mmio.blk"]
"init-lite" = ["proc.spawn", "ipc.core", "fs.read", "policy.delegate"]
"nexus-init" = ["proc.spawn", "ipc.core", "fs.read", "policy.delegate"]
updated = ["crypto.verify", "ipc.core", "statefs.boot"]
dsoftbusd = ["ipc.core", "statefs.read", "statefs.write"]
metricsd = ["ipc.core", "statefs.write"]
# timed routes to metricsd to report timer metrics — surfaced by the new
# !route-deny marker as a previously-silent denial (it lacked ipc.core).
timed = ["ipc.core"]
# imed routes to windowd to push composed text for the focused surface
# (RFC-0075); without ipc.core the name-route is !route-deny'd.
imed = ["ipc.core"]
# inputd routes to imed by name to forward resolved keys (RFC-0075) — its
# windowd leg predates name-routing (fixed fallback slots), so the missing
# grant only surfaced as `!route-deny: inputd -> imed`.
inputd = ["ipc.core"]
netstackd = ["device.mmio.net", "ipc.core"]
virtioblkd = ["device.mmio.blk", "ipc.core"]
rngd = ["device.mmio.rng", "ipc.core", "policy.delegate"]
"hidrawd" = ["device.mmio.input", "ipc.core"]
"gpud" = ["device.mmio.gpu", "ipc.core"]
# RFC-0065/0066: the ability lifecycle broker may route, query the bundle registry,
# and spawn apps (the "only abilitymgr spawns apps" invariant). windowd queries the
# registry for the dynamic Apps menu. Without `ipc.core` here, their route requests
# are policy-denied → "unreachable" (the bug this fixes).
# TASK-0065B: `session.query` = talk to sessiond (windowd relays the greeter
# login; abilitymgr gates app launches on session state).
"abilitymgr" = ["ipc.core", "bundle.query", "proc.spawn", "session.query"]
# TASK-0072 P10: `settings.query` = talk to settingsd (GET/SET ui.theme.mode);
# routing itself is gated on `ipc.core`, this documents the intended target.
"windowd" = ["ipc.core", "bundle.query", "session.query", "settings.query"]
# sessiond answers session queries only; it calls nobody.
sessiond = ["ipc.core"]
# TASK-0072 Phase 8: settingsd persists the typed prefs registry via statefsd
# (state:/prefs) — needs ipc.core to route + statefs read/write to load at boot
# and store on change.
settingsd = ["ipc.core", "statefs.read", "statefs.write"]
# pinched (system-internal compute broker): routes only to resolve its own
# server endpoint at boot; it calls no other service.
pinched = ["ipc.core"]
"selftest-client" = ["ipc.core", "proc.spawn", "rng.entropy", "device.keygen", "device.pubkey.read", "device.key.reload", "device.mmio.net", "device.mmio.input", "statefs.read", "statefs.write", "statefs.boot"]
"demo.testsvc" = []

[abi_profile."selftest-client"]
statefs_put_allow_prefix = "/state/app/selftest/"
net_bind_min_port = 1024
