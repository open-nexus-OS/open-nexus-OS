[theme]
name = "light"
version = 1

# Light overrides only what differs from base; the handoff neutrals, brand,
# sidebar, chart and text-on-glass tokens + the liquid-glass materials all
# resolve from base via the qualifier chain (base is the light-leaning default).
# See docs/dev/ui/foundations/visual/token-reconciliation.md.
[tokens]
accent = "#2563eb"
accentFg = "#ffffff"
bg = "#ffffff"
fg = "#0a0a0a"
surface = "#ffffff"
surfaceAlt = "#e9ebef"
border = "#0000001a"
divider = "#d4d4d4"
muted = "#ececf0"
mutedFg = "#717182"
focusRing = "#2563eb"

[material.surface]
type = "opaque"
