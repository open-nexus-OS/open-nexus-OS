# mimetypes.toml — the platform mime SSOT (contract: RFC-0073)
#
# Maps file extension → mime type (→ icon stem). Consumed by BOTH the files
# service (`svc.files` `mime` field) and the `nexus-mime-icons` bake
# (TASK-0294). Never duplicate this table in code.
#
# Icon resolution chain (normative, RFC-0073):
#   1. extension → mime via [types].<ext>
#   2. explicit `icon` override, if set
#   3. derived stem: mime with `/` and `+` replaced by `-` (e.g. image/svg+xml
#      → image-svg-xml.svg), if that file exists in this directory
#   4. [fallbacks].<mime class> (the part before `/`)
#   5. [fallbacks].unknown
# Directories always resolve to [fallbacks].directory.
#
# `magic = ...` (content sniffing) is reserved for a future seed; extension-only in v1.

[types]
# -- images
jpg = { mime = "image/jpeg" }
jpeg = { mime = "image/jpeg" }
png = { mime = "image/png" }
gif = { mime = "image/gif" }
bmp = { mime = "image/bmp" }
webp = { mime = "image/webp" }
svg = { mime = "image/svg+xml" }
tiff = { mime = "image/tiff" }
heic = { mime = "image/heic" }
eps = { mime = "image/x-eps" }

# -- video
mp4 = { mime = "video/mp4" }
m4v = { mime = "video/mp4" }
avi = { mime = "video/x-msvideo" }
mkv = { mime = "video/x-matroska" }
webm = { mime = "video/webm" }
mov = { mime = "video/quicktime" }

# -- audio
mp3 = { mime = "audio/mpeg" }
flac = { mime = "audio/flac" }
wav = { mime = "audio/wav" }
ogg = { mime = "audio/ogg" }
m4a = { mime = "audio/mp4" }
opus = { mime = "audio/opus" }
mid = { mime = "audio/midi" }

# -- documents / office
pdf = { mime = "application/pdf" }
doc = { mime = "application/msword" }
docx = { mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.document", icon = "application-msword" }
odt = { mime = "application/vnd.oasis.opendocument.text", icon = "application-msword" }
rtf = { mime = "application/rtf", icon = "application-msword" }
xls = { mime = "application/vnd.ms-excel", icon = "x-office-spreadsheet" }
xlsx = { mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", icon = "x-office-spreadsheet" }
ods = { mime = "application/vnd.oasis.opendocument.spreadsheet", icon = "x-office-spreadsheet" }
csv = { mime = "text/csv", icon = "x-office-spreadsheet" }
ppt = { mime = "application/vnd.ms-powerpoint", icon = "x-office-presentation" }
pptx = { mime = "application/vnd.openxmlformats-officedocument.presentationml.presentation", icon = "x-office-presentation" }
odp = { mime = "application/vnd.oasis.opendocument.presentation", icon = "x-office-presentation" }

# -- text / code
txt = { mime = "text/plain", icon = "text-plain-txt" }
log = { mime = "text/plain" }
md = { mime = "text/markdown" }
markdown = { mime = "text/markdown" }
json = { mime = "application/json" }
yaml = { mime = "application/yaml" }
yml = { mime = "application/yaml" }
toml = { mime = "application/toml" }
xml = { mime = "application/xml" }
html = { mime = "text/html" }
htm = { mime = "text/html" }
css = { mime = "text/css" }
js = { mime = "text/javascript" }
mjs = { mime = "text/javascript" }
ts = { mime = "text/x-typescript", icon = "text-javascript" }
py = { mime = "text/x-python" }
rs = { mime = "text/x-rust" }
c = { mime = "text/x-c" }
h = { mime = "text/x-c" }
cpp = { mime = "text/x-c++", icon = "text-x-c" }
hpp = { mime = "text/x-c++", icon = "text-x-c" }
sh = { mime = "application/x-shellscript", icon = "text-x-script" }
php = { mime = "application/x-php" }
nx = { mime = "text/x-nx-ui", icon = "text-x-script" }
capnp = { mime = "text/x-capnp", icon = "text-x-script" }

# -- archives / packages
zip = { mime = "application/zip" }
tar = { mime = "application/x-tar" }
gz = { mime = "application/gzip" }
tgz = { mime = "application/gzip" }
xz = { mime = "application/x-xz", icon = "package-x-generic" }
zst = { mime = "application/zstd", icon = "package-x-generic" }
"7z" = { mime = "application/x-7z-compressed", icon = "package-x-generic" }
rar = { mime = "application/vnd.rar", icon = "package-x-generic" }
nxb = { mime = "application/x-nexus-bundle", icon = "package-x-generic" }
nxs = { mime = "application/x-nexus-system-set", icon = "package-x-generic" }

# -- fonts
ttf = { mime = "font/ttf", icon = "font-x-generic" }
otf = { mime = "font/otf", icon = "font-x-generic" }
woff = { mime = "font/woff", icon = "font-x-generic" }
woff2 = { mime = "font/woff2", icon = "font-x-generic" }

# -- executables
elf = { mime = "application/x-executable" }
bin = { mime = "application/x-executable" }

[fallbacks]
image = "image-x-generic"
audio = "audio-x-generic"
video = "video-x-generic"
text = "text-plain"
font = "font-x-generic"
application = "application-octet-stream"
directory = "inode-directory"
unknown = "application-octet-stream"
