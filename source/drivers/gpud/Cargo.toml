[package]
name = "gpud"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[lib]
name = "gpud"
path = "src/lib.rs"

[features]
default = []
os-lite = [
    "dep:nexus-abi",
    "dep:nexus-ipc",
    "dep:nexus-service-entry",
    "dep:nexus-driverkit",
]
# Enables GPU-accelerated backdrop blur via virgl (QEMU -device virtio-gpu-pci,virgl=on).
# When enabled and virgl is detected at runtime, gpud emits "gpud: virgl ready".
# Without this feature or when virgl is not detected, CPU fallback is used.
virgl = []

[package.metadata.nexus-service]
kind = "service"
stack_pages = 2

[dependencies]
libm = "0.2"
nexus-gfx = { path = "../../../userspace/nexus-gfx" }
# Gate 2: the windowd↔gpud wire SSOT (opcodes/status/cursor magics + control
# frame codecs), shared with windowd so neither end hand-mirrors the other.
nexus-display-proto = { path = "../../libs/nexus-display-proto" }
# RFC-0067 P5: the CPU vector fallback rasterizes via the one SDF math SSOT
# (nexus-sdf fixed-point AA), matching the GPU shaders + the compositor.
nexus-sdf = { path = "../../../userspace/ui/sdf" }
nexus-abi = { path = "../../libs/nexus-abi", optional = true }
nexus-ipc = { path = "../../../userspace/nexus-ipc", default-features = false, features = ["os-lite", "kernel-ipc"], optional = true }
nexus-service-entry = { path = "../../libs/nexus-service-entry", optional = true }
nexus-driverkit = { path = "../../libs/nexus-driverkit", optional = true }
