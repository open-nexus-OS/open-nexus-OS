[package]
name = "pinched"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[features]
default = ["std"]
std = []
os-lite = [
    "dep:nexus-service-entry",
    "dep:nexus-abi",
    "dep:nexus-ipc",
    "nexus-ipc/os-lite",
    "nexus-ipc/kernel-ipc",
    "dep:nexus-workpool",
    "dep:nexus-sync",
    "dep:nexus-inet",
]

[package.metadata.nexus-service]
stack_pages = 0

[dependencies]
nexus-service-entry = { path = "../../libs/nexus-service-entry", optional = true }
nexus-abi = { path = "../../libs/nexus-abi", optional = true }
nexus-ipc = { path = "../../../userspace/nexus-ipc", optional = true, default-features = false }
nexus-workpool = { path = "../../libs/nexus-workpool", optional = true }
nexus-svg = { path = "../../../userspace/ui/svg", default-features = false }
nexus-sync = { path = "../../libs/nexus-sync", optional = true }
nexus-inet = { path = "../../libs/nexus-inet", optional = true }

[[bin]]
name = "pinched"
path = "src/main.rs"
