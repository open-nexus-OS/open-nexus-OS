[package]
name = "timed"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[features]
default = ["std"]
std = []
os-lite = [
    "dep:nexus-service-entry",
    "dep:nexus-abi",
    "dep:nexus-ipc",
    "dep:nexus-metrics",
    "nexus-ipc/os-lite",
    "nexus-ipc/kernel-ipc",
]

[lib]
path = "src/lib.rs"

[package.metadata.nexus-service]
stack_pages = 0

[dependencies]
rtc-goldfish = { path = "../../drivers/rtc/goldfish-rtc" }
nexus-service-entry = { path = "../../libs/nexus-service-entry", optional = true }
nexus-abi = { path = "../../libs/nexus-abi", optional = true }
nexus-ipc = { path = "../../../userspace/nexus-ipc", optional = true, default-features = false }
nexus-metrics = { path = "../../../userspace/nexus-metrics", optional = true, default-features = false, features = ["os-lite"] }

[[bin]]
name = "timed"
path = "src/main.rs"
