[package]
name = "imed"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
name = "imed"
path = "src/lib.rs"

[features]
default = []
os-lite = ["dep:nexus-abi", "dep:nexus-service-entry"]

[package.metadata.nexus-service]
# Host-first IME work exists, but OS init/routing is not wired yet.
# Keep `imed` out of auto-discovered OS bootstrap until the OS proof phase lands.
kind = "library"
stack_pages = 4

[dependencies]
nexus-abi = { path = "../../libs/nexus-abi", optional = true }
nexus-service-entry = { path = "../../libs/nexus-service-entry", optional = true }
