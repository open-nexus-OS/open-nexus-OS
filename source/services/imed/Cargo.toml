[package]
name = "imed"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
name = "imed"
path = "src/lib.rs"

[features]
default = []
os-lite = [
    "dep:nexus-abi",
    "dep:nexus-service-entry",
    "dep:nexus-ipc",
    "nexus-ipc/os-lite",
    "nexus-ipc/kernel-ipc",
]

[package.metadata.nexus-service]
stack_pages = 4

[dependencies]
ime-core = { path = "../../../userspace/ime-core" }
nexus-wire = { path = "../../libs/nexus-wire" }
nexus-abi = { path = "../../libs/nexus-abi", optional = true }
nexus-service-entry = { path = "../../libs/nexus-service-entry", optional = true }
nexus-ipc = { path = "../../../userspace/nexus-ipc", optional = true, default-features = false }

[[bin]]
name = "imed"
path = "src/main.rs"
