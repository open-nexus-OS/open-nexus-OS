[package]
name = "windowd"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[lib]
name = "windowd"
path = "src/lib.rs"

[features]
default = []
os-lite = [
    "dep:nexus-abi",
    "dep:nexus-ipc",
    "dep:nexus-service-entry",
    "nexus-service-entry/heap-2m",
]

[package.metadata.nexus-service]
kind = "service"
stack_pages = 8

[dependencies]
systemui = { path = "../systemui" }
input-live-protocol = { path = "../../../userspace/input-live-protocol" }
pointer-state = { path = "../../../userspace/pointer-state" }
nexus-abi = { path = "../../libs/nexus-abi", optional = true }
nexus-ipc = { path = "../../../userspace/nexus-ipc", default-features = false, features = ["os-lite", "kernel-ipc"], optional = true }
nexus-service-entry = { path = "../../libs/nexus-service-entry", optional = true }
nexus-layout = { path = "../../../userspace/ui/layout" }
nexus-layout-types = { path = "../../../userspace/ui/layout-types" }
nexus-dsl-runtime = { path = "../../../userspace/dsl/runtime", default-features = false }
nexus-dsl-ir = { path = "../../../userspace/dsl/ir", default-features = false }
nexus-sdf = { path = "../../../userspace/ui/sdf" }
nexus-effects = { path = "../../../userspace/ui/effects" }
animation = { path = "../../../userspace/ui/animation" }
# Gate 2: the windowd↔gpud wire SSOT (opcodes/status/cursor magics + control
# frame codecs), shared with gpud so neither end hand-mirrors the other.
nexus-display-proto = { path = "../../libs/nexus-display-proto" }
nexus-wire = { path = "../../libs/nexus-wire" }
nexus-gfx = { path = "../../../userspace/nexus-gfx" }
nexus-shell-desktop = { path = "../../../userspace/ui/shells/desktop" }
nexus-widget-window = { path = "../../../userspace/ui/widgets/window" }
# P3.2 windows-as-widgets: the WM title bar renders FROM the widget chrome —
# scene-raster is the promoted painter SSOT, widget-text the title node.
nexus-scene-raster = { path = "../../../userspace/ui/scene_raster" }
nexus-widget-text = { path = "../../../userspace/ui/widgets/text" }
nexus-theme-tokens = { path = "../../../userspace/ui/theme-tokens" }
nexus-text-baked = { path = "../../../userspace/ui/text-baked", default-features = false, features = ["layout"] }
# RFC-0065 / ADR-0037 step 1: the search window's content (word list + filter) is

[build-dependencies]
fontdue = "0.9"
nexus-dsl-core = { path = "../../../userspace/dsl/core" }
nexus-theme = { path = "../../../userspace/ui/theme" }
nexus-svg = { path = "../../../userspace/ui/svg" }