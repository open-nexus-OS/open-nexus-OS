# CONTEXT: Minimal SystemUI desktop shell seed for TASK-0055C.
# OWNERS: @ui
# STATUS: Experimental

id = "desktop"
kind = "desktop"
# The DSL shell program tree (TASK-0080B, repo-relative source root):
# ShellPage + LauncherPage; the 0080C mount step compiles this project and
# mounts the result through the in-compositor path.
dsl_root = "userspace/systemui/shells/desktop"
# Also valid as the desktop posture of a convertible (tablet profile), so a
# desktop↔tablet runtime switch can resolve this shell.
supported_profiles = ["desktop", "tablet"]

[first_frame]
width = 1280
height = 800

[features]
launcher = false
multiwindow = false
quick_settings = false
settings_entry = false
