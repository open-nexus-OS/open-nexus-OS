#
# CONTEXT: The DEFAULT product SystemUI boots when nothing else is selected —
# the desktop profile + desktop shell. A fork/product overrides "which shell
# starts" by shipping its own product manifest (see tablet/ and kiosk/) without
# patching core SystemUI logic.
# OWNERS: @ui
# STATUS: Experimental

id = "default"
profile = "desktop"
shell = "desktop"
theme = "nexus-default"
# Boot session mode (TASK-0081): show the login greeter; sessiond decides.
# `greeter` may name any app implementing the greeter contract (svc.session.*);
# empty = the built-in greeter view (until TASK-0080C swaps the DSL greeter).
session = "greeter"
