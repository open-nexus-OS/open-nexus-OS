#
# CONTEXT: Example locked-down KIOSK product (the "company configures a complete
# kiosk" case) — tablet hardware profile, kiosk shell, locked-down policy. The
# kiosk kind + locked-down policy suppress launcher/switch affordances at runtime
# even though the profile structurally allows other shells. A fork edits ONLY this
# manifest (profile/shell/theme/policy/deployment) — no core code changes.
# OWNERS: @ui
# STATUS: Experimental

id = "kiosk"
profile = "tablet"
shell = "kiosk"
theme = "acme-industrial"
policy_preset = "locked-down"
deployment = "warehouse-floor"
# Kiosk boots STRAIGHT into its shell app — no greeter (TASK-0081 boot TOML).
session = "auto"
