# CONTEXT: Minimal SystemUI desktop profile seed for TASK-0055C.
# OWNERS: @ui
# STATUS: Experimental

id = "desktop"
label = "Desktop"
default_shell = "desktop"
allowed_shells = ["desktop"]

[input]
# Visible QEMU/device harness reads these booleans to decide which emulated
# keyboard/mouse/tablet sources exist for this profile.
# Desktop keeps absolute tablet input enabled in the live GTK/QEMU lane so
# host-pointer motion remains stable without relying only on relative capture.
touch = true
mouse = true
kbd = true
remote = false
rotary = false

[display_defaults]
orientation = "landscape"
dpi_class = "normal"
size_class = "wide"
