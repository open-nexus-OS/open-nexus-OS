# NOTE: deliberately NO `[package.metadata.nexus-service]` block — app-host is
# NOT a boot service. nexus-init must never spawn it; execd spawns one instance
# per app on launch (TASK-0080D). build.sh builds it and hands the ELF to
# execd's build via `EXECD_APPHOST_ELF`.

[package]
name = "app-host"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[features]
default = ["std"]
std = []
os-lite = [
    "dep:nexus-service-entry",
    "nexus-service-entry/heap-8m",
    "dep:nexus-abi",
    "dep:nexus-ipc",
    "nexus-ipc/os-lite",
    "nexus-ipc/kernel-ipc",
]

[[bin]]
name = "app-host"
path = "src/main.rs"

[dependencies]
nexus-service-entry = { path = "../../libs/nexus-service-entry", optional = true }
nexus-abi = { path = "../../libs/nexus-abi", optional = true }
nexus-ipc = { path = "../../../userspace/nexus-ipc", optional = true, default-features = false }
nexus-display-proto = { path = "../../libs/nexus-display-proto" }
nexus-wire = { path = "../../libs/nexus-wire" }
# TASK-0080C: SSOT for cap→service→child-slot routing — the effect host
# derives `svc.<name>` → provisioned fixed slot from this (no_std const table).
nexus-sdk-routes = { path = "../../libs/nexus-sdk-routes" }
nexus-vfs-types = { path = "../../../userspace/vfs-types" }
# Scroll-Track S4: the IN-PROCESS query engine (no_std+alloc) behind
# `EffectHost::query()` — the same engine queryd will host once its capnp
# glue is no_std; keyset paging feeds the DSL's lazy-loading window.
nexus-query = { path = "../../libs/nexus-query", default-features = false }
# Scroll physics SSOT (Android OverScroller analog, no_std, heap-free): wheel
# notches ease toward a target; flings coast + decay — the apple-smooth feel.
animation = { path = "../../../userspace/ui/animation" }
# The DSL runtime IN the app process (R2): mount + layout the compiled
# program; hash-verify stays OFF for the embedded payload (binary = trust
# boundary, same rule as windowd's demo mount).
nexus-dsl-ir = { path = "../../../userspace/dsl/ir", default-features = false }
nexus-dsl-runtime = { path = "../../../userspace/dsl/runtime", default-features = false }
nexus-app-icons = { path = "../../../userspace/ui/app-icons", default-features = false }
nexus-mime-icons = { path = "../../../userspace/ui/mime-icons", default-features = false }
nexus-scene-raster = { path = "../../../userspace/ui/scene_raster", default-features = false }
nexus-layout = { path = "../../../userspace/ui/layout" }
nexus-layout-types = { path = "../../../userspace/ui/layout-types" }
nexus-theme-tokens = { path = "../../../userspace/ui/theme-tokens" }
# Interaction-state SSOT (hover/press wash constants) for the paint-time wash.
nexus-style = { path = "../../../userspace/ui/style" }
# The shared text SSOT (promoted out of windowd, RFC-0067 P5): pixel-real
# measurement + row-based glyph rendering for the DSL frame.
nexus-text-baked = { path = "../../../userspace/ui/text-baked", default-features = false, features = ["layout"] }

[build-dependencies]
nexus-dsl-core = { path = "../../../userspace/dsl/core" }
