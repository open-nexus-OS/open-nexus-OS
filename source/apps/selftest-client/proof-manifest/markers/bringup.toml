proves = "sched ABI rejects empty/out-of-ceiling/offline-only affinity masks (counterfactual)"

[marker."KSELFTEST: sched abi ok"]
phase = "bringup"
proves = "SYSCALL_SCHED roundtrip through the real handler: affinity set/get + shares clamp [1,1000]"

