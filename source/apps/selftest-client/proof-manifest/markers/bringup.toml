# CONTEXT: Markers in phase `bringup` (RFC-0014 order = 1).
# Loaded via `[include] markers = "markers/*.toml"` in
# `proof-manifest/manifest.toml`. The parser visits files in
# lexicographic order; within a file, `[marker."…"]` order is preserved
# verbatim.
#
# OWNERS: @runtime
# STATUS: Functional
# API_STABILITY: Stable; literals are the contract surface (referenced as
#                `M_<KEY>` constants from `markers_generated.rs`)

[marker."neuron vers."]
phase = "bringup"
proves = "kernel banner reached"

[marker."KSELFTEST: spawn reasons ok"]
phase = "bringup"
proves = "kernel selftest: spawn-reason classification"

[marker."KSELFTEST: resource sentinel ok"]
phase = "bringup"
proves = "kernel selftest: resource sentinel"

[marker."KSELFTEST: cpuid tp ok"]
phase = "bringup"
proves = "kernel selftest: tp/HartLocal CPU identity fast path live, zero heuristic fallbacks"

[marker."KSELFTEST: cpuid fallback counterfactual ok"]
phase = "bringup"
proves = "kernel selftest: poisoned tp rejected by identity fast path and counted (anti-fake)"

[marker."SELFTEST: workpool bounded ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "workpool rejects run-before-init, zero-worker init and double init (bounded contract)"

[marker."SELFTEST: workpool determinism ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "fence-coordinated parallel compute equals the sequential reference (workers=1 == workers=N)"

[marker."SELFTEST: workpool affinity ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "worker self-pin round-trips through SYSCALL_SCHED (set_affinity + get_affinity agree; C4)"

[marker."SELFTEST: pinched bounded ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "compute broker rejects oversized jobs via the completion header (bounded contract)"

[marker."SELFTEST: pinched determinism ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "VMO CAP_MOVE job round-trip: broker's parallel result equals the local reference and workers >= 1"

[marker."SELFTEST: pinched svg ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "banded parallel SVG raster on the broker is byte-identical to a local full rasterize and workers >= 1 (D4 result-proof)"

[marker."SELFTEST: inet bounded ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "interaction-net jobs beyond the depth/arena bound are rejected via the completion header (no OOM)"

[marker."SELFTEST: inet determinism ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "depth-6 add-tree folds to the exact normal-form value 2080 on the net evaluator (confluence result-proof)"

[marker."SELFTEST: inet parallel exec ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "both workpool workers performed >0 interactions in the parallel rounds (honest dispatch counters)"

[marker."SELFTEST: pinched bounded FAIL (status)"]
phase = "bringup"
proves = "broker returned an unexpected status for the oversized-job reject probe"

[marker."SELFTEST: pinched bounded FAIL (no completion)"]
phase = "bringup"
proves = "no completion header arrived for the oversized-job reject probe"

[marker."SELFTEST: pinched determinism FAIL (route)"]
phase = "bringup"
proves = "no pinched broker route available for the determinism probe"

[marker."SELFTEST: pinched determinism FAIL (elems)"]
phase = "bringup"
proves = "broker result element count mismatched the local reference"

[marker."SELFTEST: pinched determinism FAIL (mismatch)"]
phase = "bringup"
proves = "broker result bytes mismatched the local reference"

[marker."SELFTEST: pinched determinism FAIL (inline fallback)"]
phase = "bringup"
proves = "broker fell back to inline execution (workers == 0)"

[marker."SELFTEST: pinched determinism FAIL (status)"]
phase = "bringup"
proves = "broker returned an unexpected status for the determinism probe"

[marker."SELFTEST: pinched determinism FAIL (no completion)"]
phase = "bringup"
proves = "no completion header arrived for the determinism probe"

[marker."SELFTEST: pinched svg FAIL (elems)"]
phase = "bringup"
proves = "banded SVG raster result element count mismatched"

[marker."SELFTEST: pinched svg FAIL (digest)"]
phase = "bringup"
proves = "banded SVG raster digest mismatched the local rasterize"

[marker."SELFTEST: pinched svg FAIL (inline fallback)"]
phase = "bringup"
proves = "SVG raster fell back to inline execution (workers == 0)"

[marker."SELFTEST: pinched svg FAIL (status)"]
phase = "bringup"
proves = "broker returned an unexpected status for the SVG raster probe"

[marker."SELFTEST: pinched svg FAIL (no completion)"]
phase = "bringup"
proves = "no completion header arrived for the SVG raster probe"

[marker."SELFTEST: inet bounded FAIL (status)"]
phase = "bringup"
proves = "net evaluator returned an unexpected status for the bound-reject probe"

[marker."SELFTEST: inet bounded FAIL (no completion)"]
phase = "bringup"
proves = "no completion header arrived for the bound-reject probe"

[marker."SELFTEST: inet determinism FAIL (value)"]
phase = "bringup"
proves = "net evaluator normal form diverged from the expected value"

[marker."SELFTEST: inet determinism FAIL (no interactions)"]
phase = "bringup"
proves = "net evaluator reported zero interactions"

[marker."SELFTEST: inet determinism FAIL (status)"]
phase = "bringup"
proves = "net evaluator returned an unexpected status for the determinism probe"

[marker."SELFTEST: inet determinism FAIL (no completion)"]
phase = "bringup"
proves = "no completion header arrived for the net determinism probe"

[marker."SELFTEST: inet parallel exec FAIL (counters)"]
phase = "bringup"
proves = "parallel dispatch counters show a worker performed no interactions"

[marker."SELFTEST: affinity applied ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "userspace pins/widens its own affinity through SYSCALL_SCHED and reads it back (TASK-0042 B6)"

[marker."SELFTEST: qos shares ratio ok"]
