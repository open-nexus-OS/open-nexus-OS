proves = "memset/memcpy builtins are exact across pointer-alignment x length combinations on stack and heap (task #14)"

[marker."SELFTEST: thread spawn ok"]
phase = "bringup"
emit_when = { profile = "headless" }
proves = "same-AS compute thread: spawn via as_self+SYSCALL_SPAWN, trampoline entry/exit, sentinel visible in shared AS, reaped via wait"

[marker."KSELFTEST: sched affinity reject ok"]
