# CONTEXT: TASK-0062 GPU-only display proof markers (Phase 6).
# OWNERS: @ui @runtime
# STATUS: In Progress (GPU-only migration)
# API_STABILITY: Stable literals once TASK-0062 Phase 6 closes
#
# Architecture: GPU-only path. windowd is the sole display owner — it creates the
# framebuffer VMO and sends it to gpud via OP_SET_FRAMEBUFFER_VMO. gpud provides
# scanout (ATTACH_BACKING + SET_SCANOUT) on demand. No fbdevd, no ramfb, no
# handoff from another service — one owner, one path.

[marker."windowd: ready (w=1280, h=800, hz=120)"]
phase = "end"
proves = "windowd initialized the fixed visible desktop profile"

[marker."windowd: backend=gpu"]
phase = "bringup"
proves = "windowd is the sole display owner — creates framebuffer VMO, hands off to gpud for scanout"

[marker."display: bootstrap on"]
phase = "end"
emit_when = { profile = "full" }
proves = "windowd emitted bootstrap display evidence only after the first composed frame and gpud handoff attempt"

[marker."display: mode 1280x800 argb8888"]
phase = "end"
proves = "GPU-only display path accepted exactly the fixed 1280x800 BGRA8888 virtio-gpu mode"

[marker."windowd: compose ready"]
phase = "end"
emit_when = { profile = "full" }
proves = "windowd completed first-frame composition into gpud scanout VMO"

[marker."windowd: backend=visible"]
phase = "end"
proves = "windowd selected the visible backend for the GPU present path"

[marker."windowd: present ok (seq=1 dmg=1)"]
phase = "end"
proves = "windowd composed damaged surface state and produced a minimal present acknowledgement"

[marker."windowd: present visible ok"]
phase = "end"
proves = "windowd composed the visible frame into gpud scanout VMO"

[marker."windowd: present scheduler on"]
phase = "end"
proves = "windowd v2a present scheduler path was activated"

[marker."display: first scanout ok"]
phase = "end"
proves = "windowd observed successful first gpud scanout handoff for the composed visible frame"

[marker."systemui: first frame visible"]
phase = "end"
proves = "TOML-backed SystemUI desktop shell frame was the visible-present source"

[marker."SELFTEST: ui v2 present ok"]
phase = "end"
emit_when = { profile = "full" }
proves = "selftest observed the v2 present state in GPU path"

[marker."SELFTEST: ui visible present ok"]
phase = "end"
emit_when = { profile = "full" }
proves = "observer-only selftest completed service-owned visible present path in GPU-only mode"

[marker."windowd: cursor svg loaded"]
phase = "end"
emit_when = { profile = "full" }
proves = "Mocu SVG cursor was rasterized and available for composition"

[marker."windowd: wallpaper visible"]
phase = "end"
emit_when = { profile = "full" }
proves = "wallpaper source was loaded and visible in composed frame"

[marker."windowd: text target visible"]
phase = "end"
emit_when = { profile = "full" }
proves = "text proof target was rendered in composed frame"

[marker."windowd: icon target visible"]
phase = "end"
emit_when = { profile = "full" }
proves = "icon proof target was rendered in composed frame"

[marker."windowd: effects on"]
phase = "end"
emit_when = { profile = "full" }
proves = "shadow/blur/glass effects were activated in compositor"

[marker."windowd: effect blur ok"]
phase = "end"
emit_when = { profile = "full" }
proves = "backdrop blur effect rendered correctly"

[marker."SELFTEST: ui v3 effect ok"]
phase = "end"
emit_when = { profile = "full" }
proves = "selftest observed effects-path evidence in GPU path"

[marker."launcher: first frame ok"]
phase = "end"
proves = "launcher queued its first frame and observed present acknowledgement"

[marker."SELFTEST: ui launcher present ok"]
phase = "end"
proves = "selftest observed the launcher present state"

[marker."SELFTEST: ui resize ok"]
phase = "end"
proves = "selftest observed a committed resized surface and present state"

[marker."windowd: input on"]
phase = "end"
proves = "windowd v2a input routing path was activated"

[marker."windowd: focus -> 1"]
phase = "end"
proves = "windowd updated focus to the deterministic launcher surface after a routed click"

[marker."windowd: full-window color visible"]
phase = "end"
emit_when = { profile = "full" }
proves = "full-window compositor fill color is visible in the composed frame"

[marker."windowd: cursor move visible"]
phase = "end"
emit_when = { profile = "full" }
proves = "cursor position change was reflected in the composed visible frame"

[marker."launcher: click ok"]
phase = "end"
proves = "launcher reported click event on the routed cursor <-> interactive-panel path"

[marker."inputd: ready"]
phase = "end"
proves = "bounded inputd merge/config/route core was initialized"

[marker."inputd: keymap=de"]
phase = "end"
proves = "canonical inputd startup path selected deterministic de keymap"
