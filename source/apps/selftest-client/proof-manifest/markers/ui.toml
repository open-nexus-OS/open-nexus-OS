# CONTEXT: TASK-0055 headless UI/windowd proof markers.
# OWNERS: @ui @runtime
# STATUS: Done
# API_STABILITY: Stable literals once TASK-0055 closes

[marker."windowd: ready (w=64, h=48, hz=60)"]
phase = "end"
proves = "windowd initialized a bounded headless desktop profile"

[marker."windowd: systemui loaded (profile=desktop)"]
phase = "end"
proves = "windowd installed the deterministic base SystemUI/headless layer state"

[marker."windowd: present ok (seq=1 dmg=1)"]
phase = "end"
proves = "windowd composed damaged surface state and produced a minimal present acknowledgement"

[marker."launcher: first frame ok"]
phase = "end"
proves = "launcher queued its first frame and observed present acknowledgement"

[marker."SELFTEST: ui launcher present ok"]
phase = "end"
proves = "selftest observed the launcher present state"

[marker."SELFTEST: ui resize ok"]
phase = "end"
proves = "selftest observed a committed resized surface and present state"

[marker."display: bootstrap on"]
phase = "end"
proves = "visible QEMU scanout bootstrap path was selected by the boot-mode knob"

[marker."display: mode 1280x800 argb8888"]
phase = "end"
proves = "visible bootstrap accepted exactly the fixed 1280x800 ARGB8888 ramfb mode"

[marker."windowd: backend=visible"]
phase = "end"
proves = "windowd selected the visible backend for the TASK-0055C present path"

[marker."windowd: present visible ok"]
phase = "end"
proves = "windowd composed the visible frame and visible-present evidence exists after the guest-side ramfb target is writable"

[marker."display: first scanout ok"]
phase = "end"
proves = "selftest configured ramfb only after windowd visible-present evidence"

[marker."systemui: first frame visible"]
phase = "end"
proves = "the TOML-backed SystemUI desktop shell frame was the visible-present source"

[marker."SELFTEST: display bootstrap guest ok"]
phase = "end"
proves = "legacy TASK-0055B guest-side ramfb bootstrap marker; not emitted by the TASK-0055C visible SystemUI ladder"

[marker."SELFTEST: ui visible present ok"]
phase = "end"
proves = "selftest completed the visible windowd present path with a deterministic SystemUI first frame"
