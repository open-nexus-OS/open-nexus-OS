# =============================================================================
# Diagnostic / fragment / FAIL-label markers (P4-04 back-fill)
# These literals are emitted by selftest-client but are NOT part of any
# steady-state ladder — they're failure labels, fragment prefixes (followed
# by hex / dec emissions), or bring-up debug breadcrumbs. Declared here so
# `markers_generated.rs` is the SSOT for *every* `SELFTEST: …` /
# `dsoftbusd: …` / `dsoftbus: …` literal that appears in the source tree
# (P4-04 invariant: zero literals outside `markers_generated.rs` +
# `markers.rs`). Phase is the file-of-emission's owning phase. Profile
# gating is intentionally absent — these labels have no
# `emit_when` / `forbidden_when` semantics.
# =============================================================================

[marker."SELFTEST: abi filter allow FAIL"]
phase = "policy"

[marker."SELFTEST: abi filter deny FAIL"]
