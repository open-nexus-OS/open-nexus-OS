# CONTEXT: SSOT (Phase 4 of TASK-0023B) for the selftest-client marker
# ladder, harness profiles, and runtime selftest profiles.
#
# Cut history (this file):
#   - P4-01: skeleton ([meta] + 12 [phase.*] + placeholder [profile.full]).
#   - P4-03: populated [marker."…"] entries from the union of
#            `scripts/qemu-test.sh` expected_sequence + REQUIRE_DSOFTBUS +
#            REQUIRE_DSOFTBUS_REMOTE_{PKGFS,STATEFS} + REQUIRE_SMP arrays.
#            Every gating marker is declared exactly once. `build.rs`
#            compiles this into `markers_generated.rs` (constants only;
#            emission migration lands in P4-04).
#
# Schema reference: docs/testing/proof-manifest.md
# Phase contract:   docs/rfcs/RFC-0014-testing-contracts-and-qemu-phases-v1.md §3 + Appendix A
# Anchor RFC:       docs/rfcs/RFC-0038-selftest-client-production-grade-deterministic-test-architecture-refactor-v1.md
# Anchor task:      tasks/TASK-0023B-selftest-client-production-grade-deterministic-test-architecture-refactor.md
# OWNERS: @runtime
# STATUS: Functional (markers populated; profile bodies land in P4-05+)
# API_STABILITY: Unstable (Phase 4 evolves shape between cuts)
# TEST_COVERAGE: parsed by `cargo test -p nexus-proof-manifest`

[meta]
schema_version = "1"
default_profile = "full"

# -- 12 RFC-0014 v2 phases (canonical order) ----------------------------------
# Mapping table: docs/testing/proof-manifest.md §"Phase mapping".
[phase.bringup]
order = 1

[phase.ipc_kernel]
order = 2

[phase.mmio]
order = 3

[phase.routing]
order = 4

[phase.ota]
order = 5

[phase.policy]
order = 6

[phase.exec]
order = 7

[phase.logd]
order = 8

[phase.vfs]
order = 9

[phase.net]
order = 10

[phase.remote]
order = 11

[phase.end]
order = 12

# -- Profiles -----------------------------------------------------------------
# Harness-side profiles (P4-05). Each declares the runner script, an
# optional `extends` parent for inheritance, and the env dictionary
# forwarded to the runner. `qemu-test.sh` and `tools/os2vm.sh` consume
# these via the `nexus-proof-manifest` host CLI rather than carrying their
# own truth as bash arrays.
#
# Runtime-only profiles (`bringup|quick|ota|net|none`) land in P4-08 and
# carry `runtime_only = true` (no `runner`, dispatched by
# `os_lite::profile`).

[profile.full]
runner = "scripts/qemu-test.sh"
env = {}

[profile.smp]
runner = "scripts/qemu-test.sh"
extends = "full"
env = { REQUIRE_SMP = "1" }

[profile.dhcp]
runner = "scripts/qemu-test.sh"
extends = "full"
env = { REQUIRE_QEMU_DHCP = "1" }

# TASK-0023B P4-10: strict DHCP variant — same runner as `dhcp`, but adds
# REQUIRE_QEMU_DHCP_STRICT=1. The harness gate elevates `net: dhcp bound`
# from "best-effort, deterministic fallback allowed" to "must-be-bound"
# (failure to bind = exit 1). Replaces the legacy `test-os-dhcp-strict`
# recipe; downstream callers should invoke `just test-os PROFILE=dhcp-strict`.
[profile."dhcp-strict"]
runner = "scripts/qemu-test.sh"
extends = "dhcp"
env = { REQUIRE_QEMU_DHCP_STRICT = "1" }

[profile.os2vm]
runner = "tools/os2vm.sh"
extends = "full"
env = { REQUIRE_DSOFTBUS = "1", REQUIRE_DSOFTBUS_REMOTE_PKGFS = "1", REQUIRE_DSOFTBUS_REMOTE_STATEFS = "1" }

[profile."quic-required"]
runner = "scripts/qemu-test.sh"
extends = "full"
env = { REQUIRE_DSOFTBUS = "1" }

# -- Runtime-only profiles (TASK-0023B P4-08) ---------------------------------
# Dispatched by `os_lite::profile` (NOT by harness scripts); selected via
# `SELFTEST_PROFILE=<name>` token on the kernel command line, with
# `bringup` as the fallback baseline. `runtime_only = true` enforces
# "no `runner` allowed" at parse time. `phases = [...]` is the ordered
# subset of `[phase.*]` that `os_lite::run()` will execute; phases NOT
# listed are skipped with a single deterministic `dbg: phase X skipped`
# breadcrumb (one constant per phase, declared in the markers section).

[profile.bringup]
runtime_only = true
phases = ["bringup", "end"]

[profile.quick]
runtime_only = true
phases = ["bringup", "ipc_kernel", "mmio", "end"]

[profile.ota]
runtime_only = true
phases = ["bringup", "ipc_kernel", "ota", "end"]

[profile.net]
runtime_only = true
phases = ["bringup", "ipc_kernel", "mmio", "routing", "net", "end"]

[profile.none]
runtime_only = true
phases = ["bringup", "end"]

