[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[advisories]
# Host/bring-up note: we keep cargo-deny strict in CI, but we temporarily ignore
# atomic-polyfill unmaintained while smoltcp/heapless are still in bring-up.
ignore = [
    # atomic-polyfill is archived/unmaintained; transitively via heapless -> smoltcp.
    # Track removal by upgrading smoltcp/heapless to a portable-atomic based stack.
    "RUSTSEC-2023-0089",
]

[bans]
# Keep duplicate detection strict by default. We only permit the currently
# compatibility-constrained splits tracked in TASK-0021 closure work:
# - getrandom 0.2/0.3 (ring 0.17 line vs modern host stack)
# - windows-sys 0.52/0.61 (ring/quinn-udp/rustix vs tokio/mio/socket2)
multiple-versions = "deny"
skip = [
    { name = "getrandom", version = "0.2" },
    { name = "getrandom", version = "0.3" },
    { name = "windows-sys", version = "0.52" },
    { name = "windows-sys", version = "0.61" },
    # fontdue 0.9 uses ttf-parser 0.21, nexus-shape needs 0.24 for set_variation().
    { name = "ttf-parser", version = "0.21.1" },
    { name = "ttf-parser", version = "0.24.1" },
    # fontdue/svg stack still pulls hashbrown/foldhash 0.15/0.1 while indexmap uses 0.16/0.2.
    { name = "bitflags", version = "1.3.2" },
    { name = "bitflags", version = "2.11.0" },
    { name = "foldhash", version = "0.1.5" },
    { name = "foldhash", version = "0.2.0" },
    { name = "hashbrown", version = "0.15.5" },
    { name = "hashbrown", version = "0.16.1" },
]
