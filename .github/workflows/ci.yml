#
# CI is a thin wrapper over the canonical `just` recipes (the justfile is the
# gate SSOT — see CONTRIBUTING.md). Jobs here must not re-implement gate
# logic; if a gate needs to change, change the just recipe and keep this file
# a dumb caller.

name: CI

run-name: >
  CI • ${{ github.ref_name }} •
  ${{ github.event_name == 'pull_request'
      && format('PR #{0}: {1}', github.event.number, github.event.pull_request.title)
      || github.event.head_commit.message }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # `just check` = fmt-check + lint + deny-check + arch-check.
  lint:
    name: lint (just check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      # One pinned toolchain (rust-toolchain.toml drives it) so CI clippy/rustfmt
      # match the local `just` recipes and every real build path exactly.
      - name: Install Rust (pinned nightly-2025-01-15)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          components: rustfmt, clippy
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
      # Prebuilt binary: `cargo install cargo-deny` would compile it with the
      # last-installed toolchain (nightly-2025-01-15 = rustc 1.86), but recent
      # cargo-deny needs rustc >= 1.88. A downloaded binary sidesteps the skew.
      - name: Install cargo-deny (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.18.9
      - name: just check
        run: just check

  host-tests:
    name: host tests (just test-host + test-e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      - name: Install Rust (pinned nightly-2025-01-15)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
      - name: just test-host
        run: just test-host
      - name: just test-e2e
        run: just test-e2e

  miri:
    name: miri (just miri-strict + miri-fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      - name: Install Rust (nightly + miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          components: miri, rust-src
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
      - name: just miri-strict
        run: just miri-strict
      - name: just miri-fs
        run: just miri-fs

  deadcode:
    name: deadcode (just deadcode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (ripgrep, just)
        run: sudo apt-get update && sudo apt-get install -y ripgrep just
      - name: just deadcode
        run: just deadcode

  kernel:
    name: kernel (just build-kernel + lint-kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      - name: Install Rust (nightly, riscv target + build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          targets: riscv64imac-unknown-none-elf
          components: rust-src, clippy
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-kernel-${{ hashFiles('**/Cargo.lock') }}
      - name: just build-kernel
        run: just build-kernel
      - name: just lint-kernel
        run: just lint-kernel

  qemu:
    name: qemu selftests (headless profile)
    needs: host-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (qemu, capnproto, mold, just)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-misc \
            qemu-system-riscv64 \
            capnproto \
            mold \
            just
      - name: Install Rust (pinned nightly, riscv target + llvm-tools)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          targets: riscv64imac-unknown-none-elf
          components: llvm-tools-preview, rust-src
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-qemu-${{ hashFiles('**/Cargo.lock') }}
      # `headless` is the CI profile (justfile: `ci-os-headless`): full service
      # chain, display phases truncated (GitHub runners have no display/GPU
      # backend). `full` expects visible/display markers and is for local
      # interactive use. The chain-marker gate (input-route/gpu-core/display)
      # runs inside the harness on success.
      - name: QEMU selftests (chain-marker gate runs inside the harness)
        env:
          RUN_UNTIL_MARKER: "1"
          RUN_TIMEOUT: "180s"
        run: ./scripts/qemu-test.sh --profile=headless
      # SMP=2 real-parallelism lane (MTTCG). Inherently non-deterministic, so
      # `just ci-os-smp` retries (bounded); a real regression fails every
      # attempt. Kept separate from the deterministic gate so a scheduling flake
      # never reds the build, but parallelism coverage still runs in CI.
      - name: QEMU SMP=2 parallelism lane (bounded retry)
        run: just ci-os-smp
      - name: Upload run logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-run-logs
          # Logs land in build/logs/<profile>--<timestamp>/ (uart.log,
          # qemu.stderr, build.stderr, hypothesis.json). See
          # docs/testing/run-logs.md.
          path: build/logs/**
          if-no-files-found: warn
