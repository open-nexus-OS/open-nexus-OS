#
# CI is a thin wrapper over the canonical `just` recipes (the justfile is the
# gate SSOT — see CONTRIBUTING.md). Jobs here must not re-implement gate
# logic; if a gate needs to change, change the just recipe and keep this file
# a dumb caller.

name: CI

run-name: >
  CI • ${{ github.ref_name }} •
  ${{ github.event_name == 'pull_request'
      && format('PR #{0}: {1}', github.event.number, github.event.pull_request.title)
      || github.event.head_commit.message }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # `just check` = fmt-check + lint + deny-check + arch-check.
  lint:
    name: lint (just check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Rust (nightly, kernel rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          components: rustfmt
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-deny (pinned)
        run: cargo install --locked cargo-deny --version 0.18.9
      - name: just check
        run: just check

  host-tests:
    name: host tests (just test-host + test-e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
      - name: just test-host
        run: just test-host
      - name: just test-e2e
        run: just test-e2e

  miri:
    name: miri (just miri-strict + miri-fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      - name: Install Rust (nightly + miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          components: miri, rust-src
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
      - name: just miri-strict
        run: just miri-strict
      - name: just miri-fs
        run: just miri-fs

  deadcode:
    name: deadcode (just deadcode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (ripgrep, just)
        run: sudo apt-get update && sudo apt-get install -y ripgrep just
      - name: just deadcode
        run: just deadcode

  kernel:
    name: kernel (just build-kernel + lint-kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (capnproto, just)
        run: sudo apt-get update && sudo apt-get install -y capnproto just
      - name: Install Rust (nightly, riscv target + build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          targets: riscv64imac-unknown-none-elf
          components: rust-src, clippy
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-kernel-${{ hashFiles('**/Cargo.lock') }}
      - name: just build-kernel
        run: just build-kernel
      - name: just lint-kernel
        run: just lint-kernel

  qemu:
    name: qemu selftests (full profile)
    needs: host-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps (qemu, capnproto, mold, just)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-misc \
            qemu-system-riscv64 \
            capnproto \
            mold \
            just
      - name: Install Rust (stable, harness host tools)
        uses: dtolnay/rust-toolchain@stable
      - name: Install Rust (nightly, riscv target + llvm-tools)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-15
          targets: riscv64imac-unknown-none-elf
          components: llvm-tools-preview, rust-src
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-qemu-${{ hashFiles('**/Cargo.lock') }}
      - name: QEMU selftests (chain-marker gate runs inside the harness)
        env:
          RUN_UNTIL_MARKER: "1"
          RUN_TIMEOUT: "180s"
        run: ./scripts/qemu-test.sh --profile=full
      - name: Upload run logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-run-logs
          # Logs land in build/logs/<profile>--<timestamp>/ (uart.log,
          # qemu.stderr, build.stderr, hypothesis.json). See
          # docs/testing/run-logs.md.
          path: build/logs/**
          if-no-files-found: warn
