# SPDX-License-Identifier: Apache-2.0
#
# CONTEXT: GitHub Actions workflow for Open Nexus OS (fmt, lint, host tests, OS build, optional QEMU smoke).
# OWNERS: @tools-team
# STATUS: Functional
# API_STABILITY: Stable
# TEST_COVERAGE: No tests
# ADR: docs/architecture/02-selftest-and-ci.md

name: Open Nexus OS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  STABLE_TOOLCHAIN: stable
  NIGHTLY_TOOLCHAIN: nightly-2025-01-15
  RUSTFLAGS_CHECK_CFG: --check-cfg=cfg(nexus_env,values("host","os"))
  RUN_OS_SMOKE: "false" # set to "true" to enable the QEMU smoke job
  CARGO_DENY_VERSION: "0.18.9"
  DENY_TOOLCHAIN: "1.88.0"

jobs:
  fmt-stable:
    name: fmt (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install "${STABLE_TOOLCHAIN}"
          rustup default "${STABLE_TOOLCHAIN}"
          rustup toolchain install "${NIGHTLY_TOOLCHAIN}" --profile minimal --component rustfmt
      - name: Cargo fmt check (stable, all)
        run: cargo +${STABLE_TOOLCHAIN} fmt --all -- --config-path config/rustfmt.toml --check
      - name: Cargo fmt check (kernel, nightly)
        run: cargo +${NIGHTLY_TOOLCHAIN} fmt -p neuron -p neuron-boot -- --config-path config/rustfmt.toml --check

  lint-host:
    name: lint (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev capnproto just
      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install "${STABLE_TOOLCHAIN}"
          rustup default "${STABLE_TOOLCHAIN}"
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: Lint
        run: just lint

  tests-host:
    name: tests (host workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev capnproto just
      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install "${STABLE_TOOLCHAIN}"
          rustup default "${STABLE_TOOLCHAIN}"
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Host tests (exclude kernel)
        run: cargo test --workspace --exclude neuron --exclude neuron-boot --exclude nexus-kernel

  build-os:
    name: build (Makefile host mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev capnproto just qemu-system-misc qemu-system-riscv64 mold
      - name: Install Rust toolchains and targets
        run: |
          rustup set profile minimal
          rustup toolchain install "${STABLE_TOOLCHAIN}"
          rustup toolchain install "${NIGHTLY_TOOLCHAIN}" --profile minimal
          rustup target add riscv64imac-unknown-none-elf --toolchain "${STABLE_TOOLCHAIN}"
          rustup target add riscv64imac-unknown-none-elf --toolchain "${NIGHTLY_TOOLCHAIN}"
          rustup default "${STABLE_TOOLCHAIN}"
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-deny toolchain (pinned)
        run: rustup toolchain install "${DENY_TOOLCHAIN}" --profile minimal
      - name: Install cargo-deny (pinned)
        run: cargo +"${DENY_TOOLCHAIN}" install --locked cargo-deny --version "${CARGO_DENY_VERSION}"
      # NOTE: we deliberately do NOT call `make initial-setup` here.
      # `initial-setup` is for local developer onboarding (interactive
      # `sudo apt-get install`, podman rootless probe, pre-commit gate
      # rerun). The `Install deps` and `Install Rust toolchains and
      # targets` steps above already cover the CI-only subset.
      - name: Make build (host mode)
        env:
          CARGO_BIN: cargo
        run: make build MODE=host
      # b84e4c2 contract: `make build` produces neuron-boot + init-lite
      # under target/riscv64imac-unknown-none-elf/release/. Upload them
      # so `os-smoke` can consume them via NEXUS_SKIP_BUILD=1 instead
      # of re-doing a cold build.
      - name: Upload OS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: os-build-${{ github.sha }}
          path: |
            target/riscv64imac-unknown-none-elf/release/neuron-boot
            target/riscv64imac-unknown-none-elf/release/init-lite
          if-no-files-found: error
          retention-days: 7

  os-smoke:
    name: os smoke (QEMU selftest)
    needs: build-os
    if: ${{ vars.RUN_OS_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev capnproto just qemu-system-misc qemu-system-riscv64 mold
      - name: Install Rust toolchains and targets
        run: |
          rustup set profile minimal
          rustup toolchain install "${STABLE_TOOLCHAIN}"
          rustup toolchain install "${NIGHTLY_TOOLCHAIN}" --profile minimal
          rustup target add riscv64imac-unknown-none-elf --toolchain "${STABLE_TOOLCHAIN}"
          rustup target add riscv64imac-unknown-none-elf --toolchain "${NIGHTLY_TOOLCHAIN}"
          rustup default "${STABLE_TOOLCHAIN}"
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-os-smoke-${{ hashFiles('**/Cargo.lock') }}
      # b84e4c2 contract: consume the prebuilt artifacts from `build-os`
      # via NEXUS_SKIP_BUILD=1 instead of doing an independent cold build.
      # The `--profile=smp` selection matches `make test`'s SMP ladder so
      # the verify-uart marker subset is consistent with local `make test`.
      - name: Download OS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: os-build-${{ github.sha }}
          path: target/riscv64imac-unknown-none-elf/release/
      - name: Mark prebuilt artifacts as executable
        run: chmod +x target/riscv64imac-unknown-none-elf/release/{neuron-boot,init-lite}
      - name: OS smoke (QEMU selftests, prebuilt)
        env:
          NEXUS_SKIP_BUILD: "1"
          RUN_UNTIL_MARKER: "1"
          RUN_TIMEOUT: 30m
        run: ./scripts/qemu-test.sh --profile=smp
      - name: Upload uart log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uart-log
          path: uart.log
