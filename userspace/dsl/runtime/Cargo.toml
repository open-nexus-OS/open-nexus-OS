[package]
name = "nexus-dsl-runtime"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
name = "nexus_dsl_runtime"
path = "src/lib.rs"

[features]
default = ["std"]
# Host conveniences only; the interpreter itself is no_std+alloc.
std = []

[dependencies]
nexus-dsl-ir = { path = "../ir", default-features = false }
# hash-verify intentionally NOT enabled here: hosts that fetch payloads
# (app-host) turn it on themselves; embedded mounts stay lean.
capnp = { version = "0.24", default-features = false, features = ["alloc"] }
nexus-layout-types = { path = "../../ui/layout-types" }
nexus-layout = { path = "../../ui/layout" }
nexus-style = { path = "../../ui/style" }
nexus-widget-button = { path = "../../ui/widgets/button" }
nexus-widget-card = { path = "../../ui/widgets/card" }
nexus-widget-text-field = { path = "../../ui/widgets/text_field" }
nexus-widget-toggle = { path = "../../ui/widgets/toggle" }
nexus-widget-icon = { path = "../../ui/widgets/icon" }
nexus-widget-badge = { path = "../../ui/widgets/badge" }
nexus-widget-chip = { path = "../../ui/widgets/chip" }
nexus-widget-avatar = { path = "../../ui/widgets/avatar" }
nexus-widget-checkbox = { path = "../../ui/widgets/checkbox" }
nexus-widget-slider = { path = "../../ui/widgets/slider" }
nexus-widget-spinner = { path = "../../ui/widgets/spinner" }
nexus-widget-progress-bar = { path = "../../ui/widgets/progress_bar" }
nexus-widget-toast = { path = "../../ui/widgets/toast" }
nexus-widget-banner = { path = "../../ui/widgets/banner" }
nexus-widget-skeleton = { path = "../../ui/widgets/skeleton" }
nexus-theme-tokens = { path = "../../ui/theme-tokens" }

[dev-dependencies]
nexus-dsl-core = { path = "../core" }
nexus-text-baked = { path = "../../ui/text-baked", features = ["layout"] }
