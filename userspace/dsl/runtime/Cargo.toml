[package]
name = "nexus-dsl-runtime"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
name = "nexus_dsl_runtime"
path = "src/lib.rs"

[features]
default = ["std"]
# Host conveniences only; the interpreter itself is no_std+alloc.
std = []

[dependencies]
nexus-dsl-ir = { path = "../ir", default-features = false }
# hash-verify intentionally NOT enabled here: hosts that fetch payloads
# (app-host) turn it on themselves; embedded mounts stay lean.
capnp = { version = "0.24", default-features = false, features = ["alloc"] }
nexus-layout-types = { path = "../../ui/layout-types" }
nexus-layout = { path = "../../ui/layout" }
nexus-theme-tokens = { path = "../../ui/theme-tokens" }
