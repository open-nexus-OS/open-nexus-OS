[package]
name = "nexus-dsl-core"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
name = "nexus_dsl_core"
path = "src/lib.rs"

[features]
default = ["std"]
# Host tooling: filesystem source loading + pretty diagnostics.
# Off => no_std+alloc checker core (in-system lint/validate use).
std = []

[dependencies]
nexus-dsl-ir = { path = "../ir", default-features = false, features = ["write"] }
capnp = { version = "0.24", default-features = false, features = ["alloc"] }
