[package]
name = "nx-dsl"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[[bin]]
name = "nx-dsl"
path = "src/main.rs"

[dependencies]
nexus-dsl-core = { path = "../core" }
nexus-dsl-ir = { path = "../ir", features = ["write"] }
nexus-dsl-runtime = { path = "../runtime" }
nexus-theme-tokens = { path = "../../ui/theme-tokens" }
nexus-layout-types = { path = "../../ui/layout-types" }
