#
# CONTEXT: Chat — a DSL app (`payload.nxir` compiled from ui/ by bundlemgrd's
# build; launched via abilitymgr → execd → app-host, own windowd surface).
# The former Rust-crate renderer is retired (promote-best: one UI stack).
# The app-to-app exports stay DECLARED for the TASK-0081 C2 exports channel.
# Schema: tools/nexus-idl/schemas/manifest.capnp  ·  Docs: docs/packaging/nxb.md

name = "chat"
version = "1.0.0"
min_sdk = "1.0.0"
bundle_type = "app"
payload_kind = "ui-program"
abilities = ["chat.MainAbility"]
caps = ["nexus.permission.WINDOW"]
provides = []
resources = []
exports = [
    { ability = "chat.Send", permission = "app.chat.SEND" },
    { ability = "chat.Receive", permission = "app.chat.RECEIVE" },
]
