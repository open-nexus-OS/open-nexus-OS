[package]
name = "chat-app"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false

# RFC-0067 P2.4: chat as a real app that owns its content. The message model +
# provider moved out of the generic `nexus-virtual-list` widget; the chat cell
# view moved out of `nexus-shell-desktop`. windowd consumes the provider's data;
# the scene-graph path uses the cell. The generic list widget stays content-free
# (it is a widget, not a chat). Pure + host-tested; `no_std` so windowd links it.

[lib]
name = "chat_app"
path = "src/lib.rs"

[[bin]]
name = "chat-app"
path = "src/main.rs"

[dependencies]
nexus-virtual-list = { path = "../../ui/widgets/virtual_list", default-features = false }
nexus-layout-types = { path = "../../ui/layout-types" }
nexus-theme-tokens = { path = "../../ui/theme-tokens" }
nexus-style = { path = "../../ui/style" }
nexus-widget-panel = { path = "../../ui/widgets/panel" }
