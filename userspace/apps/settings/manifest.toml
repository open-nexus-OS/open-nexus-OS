#
# CONTEXT: Settings — the system settings DSL app (the design handoff's
# "OS Settings Window"). `bundle_type = "settings"` is the privilege ceiling
# that admits `nexus.permission.SETTINGS` (settingsd typed registry);
# presentation keys route through windowd (the presentation authority).
# Schema: tools/nexus-idl/schemas/manifest.capnp  ·  Docs: docs/packaging/nxb.md

name = "settings"
version = "0.1.0"
min_sdk = "1.0.0"
bundle_type = "settings"
# Launcher tile glyph (theme icon-set symbol, resources/themes [icons.symbols]).
icon = "gearshape|#a3aab6|#525a68"
# Real app-icon artwork (SVG in the bundle's assets/), rasterized at build
# time by nexus-app-icons; the packed `icon` string stays the fallback glyph.
icon_svg = "assets/icon.svg"
payload_kind = "ui-program"
abilities = ["settings.MainAbility"]
caps = ["nexus.permission.WINDOW", "nexus.permission.SETTINGS"]
# Shared window-frame components (TASK-0081 C3 library): compiled INTO this
# app's .nxir at build time.
dependencies = ["window-kit"]
provides = []
resources = []
