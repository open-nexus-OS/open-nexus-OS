#
# CONTEXT: Calculator — a REAL calculator (was: the counter demo; the user
# asked for the promotion) and still the canonical smallest DSL app + the
# DSL animation demo (the display carries `.effect(wiggle)`). Launched via
# abilitymgr → execd → app-host, presenting through its own cross-process
# windowd surface (ADR-0042).
# Compiled to `manifest.nxb` (Cap'n Proto) by `tools/nxb-pack` and installed
# into the `bundlemgrd` registry; `abilitymgr` resolves the launch from here.
# Schema: tools/nexus-idl/schemas/manifest.capnp  ·  Docs: docs/packaging/nxb.md
#
# NOTE: `publisher`/`sig` are zero placeholders (unsigned bring-up bundle).

name = "calculator"
version = "0.1.0"
min_sdk = "1.0.0"
bundle_type = "app"
# Launcher tile glyph (theme icon-set symbol, resources/themes [icons.symbols]).
icon = "calculator"
payload_kind = "ui-program"
abilities = ["calculator.MainAbility"]
caps = ["nexus.permission.WINDOW"]
provides = []
resources = []
