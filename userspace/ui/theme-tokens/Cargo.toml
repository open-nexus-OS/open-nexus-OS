[package]
name = "nexus-theme-tokens"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[lib]
name = "nexus_theme_tokens"
path = "src/lib.rs"

[dependencies]
nexus-layout-types = { path = "../layout-types" }

# Host-only: generates the typed token snapshots from the `.nxtheme.toml` SSOT at
# build time (RFC-0070 D3). Does not affect the crate's `no_std` runtime.
[build-dependencies]
nexus-theme = { path = "../theme" }
